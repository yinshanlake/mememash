<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeMash - Which meme is better?</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    padding: 24px 16px 8px;
  }

  header h1 {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ff6b6b, #ffa500, #ff6b6b);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  header p {
    color: #888;
    font-size: 14px;
    margin-top: 4px;
  }

  .nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 12px;
  }

  .nav button {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #ccc;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }

  .nav button:hover, .nav button.active {
    background: #2a2a2a;
    border-color: #ff6b6b;
    color: #fff;
  }

  /* Battle view */
  .battle-container {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 24px;
    padding: 20px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .question {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    padding: 0 16px 8px;
    color: #eee;
  }

  .meme-card {
    flex: 1;
    max-width: 520px;
    background: #141414;
    border: 2px solid #222;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .meme-card:hover {
    border-color: #ff6b6b;
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(255, 107, 107, 0.15);
  }

  .meme-card.winner {
    border-color: #4caf50;
    box-shadow: 0 0 40px rgba(76, 175, 80, 0.3);
  }

  .meme-card.loser {
    opacity: 0.4;
    transform: scale(0.97);
  }

  .meme-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    overflow: hidden;
  }

  .meme-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .meme-info {
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .meme-title {
    font-weight: 600;
    font-size: 15px;
    color: #ddd;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 70%;
  }

  .meme-elo {
    font-size: 13px;
    color: #888;
    font-weight: 500;
  }

  .vs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 900;
    color: #444;
    user-select: none;
    flex-shrink: 0;
  }

  .skip-btn {
    display: block;
    margin: 0 auto 16px;
    background: none;
    border: 1px solid #333;
    color: #666;
    padding: 8px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }

  .skip-btn:hover {
    border-color: #555;
    color: #aaa;
  }

  .round-info {
    text-align: center;
    color: #555;
    font-size: 13px;
    padding-bottom: 16px;
  }

  /* Rankings view */
  .rankings-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 16px 24px 40px;
  }

  .ranking-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 16px;
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .ranking-item:hover {
    border-color: #333;
    background: #1a1a1a;
  }

  .rank-num {
    font-size: 20px;
    font-weight: 800;
    color: #555;
    min-width: 36px;
    text-align: center;
  }

  .rank-num.gold { color: #ffd700; }
  .rank-num.silver { color: #c0c0c0; }
  .rank-num.bronze { color: #cd7f32; }

  .rank-thumb {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    object-fit: cover;
    background: #0d0d0d;
  }

  .rank-details { flex: 1; }

  .rank-title {
    font-weight: 600;
    font-size: 15px;
    color: #ddd;
  }

  .rank-stats {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
  }

  .rank-elo-val {
    font-size: 18px;
    font-weight: 700;
    color: #ff6b6b;
    min-width: 60px;
    text-align: right;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: #555;
  }

  .empty-state p { margin-top: 8px; font-size: 14px; }

  .hidden { display: none !important; }

  .result-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 900;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .result-overlay.show { opacity: 1; }
  .result-overlay.win { background: rgba(76, 175, 80, 0.15); color: #4caf50; }
  .result-overlay.lose { background: rgba(255, 68, 68, 0.15); color: #ff4444; }

  .keyboard-hint {
    text-align: center;
    color: #444;
    font-size: 12px;
    padding: 4px;
  }

  .keyboard-hint kbd {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: inherit;
    font-size: 11px;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .slide-in { animation: slideIn 0.4s ease; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 8px 16px;
    color: #666;
    font-size: 13px;
  }

  .stats-bar span strong { color: #aaa; }

  .win-streak {
    text-align: center;
    padding: 4px 16px;
    font-size: 13px;
    color: #4caf50;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <h1>MemeMash</h1>
  <p>Who's the better meme? You decide.</p>
</header>

<nav class="nav">
  <button class="active" onclick="showView('battle')" id="nav-battle">Battle</button>
  <button onclick="showView('rankings')" id="nav-rankings">Rankings</button>
</nav>

<div class="stats-bar">
  <span><strong id="stat-memes">0</strong> memes</span>
  <span><strong id="stat-votes">0</strong> total votes</span>
  <span><strong id="stat-users">0</strong> players</span>
</div>

<!-- Battle View -->
<div id="view-battle">
  <div class="question">Who's the better meme?</div>
  <div class="win-streak hidden" id="win-streak"></div>
  <div class="battle-container" id="battle-area">
    <div class="empty-state" id="battle-empty">
      <div style="font-size:48px;margin-bottom:8px">&#x1F5BC;</div>
      <p>Loading memes...</p>
    </div>
  </div>
  <div id="battle-controls" class="hidden">
    <div class="keyboard-hint">
      <kbd>&larr;</kbd> left wins &nbsp;&middot;&nbsp; <kbd>&rarr;</kbd> right wins &nbsp;&middot;&nbsp; <kbd>S</kbd> skip
    </div>
    <button class="skip-btn" onclick="nextRound()">Skip this round</button>
    <div class="round-info" id="round-info"></div>
  </div>
</div>

<!-- Rankings View -->
<div id="view-rankings" class="hidden">
  <div class="rankings-container" id="rankings-list"></div>
</div>

<script>
const API = '/api';
let memes = [];
let totalVotes = 0;
let totalUsers = 0;
let roundNum = 0;
let currentPair = null;
let voting = false;
let winStreak = 0;
let lastWinnerId = null;

async function api(path, options = {}) {
  const res = await fetch(API + path, options);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

async function loadMemes() {
  try {
    memes = await api('/memes');
    updateStats();
  } catch (e) {
    console.error('Failed to load memes:', e);
  }
}

async function loadStats() {
  try {
    const stats = await api('/stats');
    totalVotes = stats.totalVotes || 0;
    totalUsers = stats.uniqueUsers || 0;
    updateStats();
  } catch (e) {
    console.error('Failed to load stats:', e);
  }
}

function showView(name) {
  ['battle', 'rankings'].forEach(v => {
    document.getElementById('view-' + v).classList.toggle('hidden', v !== name);
    document.getElementById('nav-' + v).classList.toggle('active', v === name);
  });
  if (name === 'battle') setupBattle();
  if (name === 'rankings') renderRankings();
}

async function setupBattle() {
  updateStats();
  const area = document.getElementById('battle-area');
  if (memes.length < 2) {
    document.getElementById('battle-empty').classList.remove('hidden');
    document.getElementById('battle-controls').classList.add('hidden');
    area.querySelectorAll('.meme-card, .vs').forEach(el => el.remove());
    return;
  }
  document.getElementById('battle-empty').classList.add('hidden');
  document.getElementById('battle-controls').classList.remove('hidden');
  await nextRound();
}

async function nextRound(winnerId) {
  if (memes.length < 2) return;
  voting = false;
  roundNum++;

  // Track win streak
  if (winnerId && winnerId === lastWinnerId) {
    winStreak++;
  } else if (winnerId) {
    winStreak = 1;
    lastWinnerId = winnerId;
  } else {
    winStreak = 0;
    lastWinnerId = null;
  }

  const streakEl = document.getElementById('win-streak');
  if (winStreak >= 2) {
    streakEl.textContent = winStreak + ' win streak!';
    streakEl.classList.remove('hidden');
  } else {
    streakEl.classList.add('hidden');
  }

  try {
    const url = winnerId ? '/pair?winnerId=' + winnerId : '/pair';
    currentPair = await api(url);
    renderBattle(currentPair.keepLeft);
  } catch (e) {
    console.error('Failed to get pair:', e);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderBattle(keepLeft) {
  const area = document.getElementById('battle-area');
  const a = currentPair.left;
  const b = currentPair.right;

  const leftAnim = keepLeft ? '' : ' slide-in';
  const rightAnim = ' slide-in';

  area.innerHTML =
    '<div class="meme-card' + leftAnim + '" id="card-left" onclick="vote(\'left\')">' +
      '<div class="result-overlay" id="result-left"></div>' +
      '<div class="meme-img-wrap"><img src="' + esc(a.imageUrl) + '" alt="meme"></div>' +
      '<div class="meme-info"><div class="meme-title">' + esc(a.name) + '</div><div class="meme-elo">' + a.elo + ' ELO</div></div>' +
    '</div>' +
    '<div class="vs">VS</div>' +
    '<div class="meme-card' + rightAnim + '" id="card-right" onclick="vote(\'right\')">' +
      '<div class="result-overlay" id="result-right"></div>' +
      '<div class="meme-img-wrap"><img src="' + esc(b.imageUrl) + '" alt="meme"></div>' +
      '<div class="meme-info"><div class="meme-title">' + esc(b.name) + '</div><div class="meme-elo">' + b.elo + ' ELO</div></div>' +
    '</div>';

  document.getElementById('round-info').textContent = 'Round #' + roundNum;
  updateStats();
}

async function vote(side) {
  if (voting || !currentPair) return;
  voting = true;

  const winner = side === 'left' ? currentPair.left : currentPair.right;
  const loser = side === 'left' ? currentPair.right : currentPair.left;

  const leftCard = document.getElementById('card-left');
  const rightCard = document.getElementById('card-right');
  const leftOverlay = document.getElementById('result-left');
  const rightOverlay = document.getElementById('result-right');

  if (side === 'left') {
    leftCard.classList.add('winner');
    rightCard.classList.add('loser');
    leftOverlay.className = 'result-overlay show win';
    leftOverlay.textContent = 'WIN';
    rightOverlay.className = 'result-overlay show lose';
    rightOverlay.textContent = 'LOSE';
  } else {
    rightCard.classList.add('winner');
    leftCard.classList.add('loser');
    rightOverlay.className = 'result-overlay show win';
    rightOverlay.textContent = 'WIN';
    leftOverlay.className = 'result-overlay show lose';
    leftOverlay.textContent = 'LOSE';
  }

  try {
    const result = await api('/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ winnerId: winner.id, loserId: loser.id }),
    });
    const wi = memes.findIndex(m => m.id === winner.id);
    const li = memes.findIndex(m => m.id === loser.id);
    if (wi !== -1) memes[wi] = result.winner;
    if (li !== -1) memes[li] = result.loser;
    totalVotes = result.totalVotes || totalVotes + 1;
    totalUsers = result.uniqueUsers || totalUsers;
    updateStats();
  } catch (e) {
    console.error('Vote failed:', e);
  }

  const winnerId = winner.id;
  setTimeout(() => nextRound(winnerId), 800);
}

document.addEventListener('keydown', (e) => {
  if (document.getElementById('view-battle').classList.contains('hidden')) return;
  if (e.key === 'ArrowLeft') vote('left');
  else if (e.key === 'ArrowRight') vote('right');
  else if (e.key === 's' || e.key === 'S') nextRound();
});

function renderRankings() {
  const container = document.getElementById('rankings-list');
  if (memes.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:48px">&#x1F3C6;</div><p>No memes yet!</p></div>';
    return;
  }

  const sorted = [...memes].sort((a, b) => b.elo - a.elo);
  let html = '';
  sorted.forEach((m, i) => {
    const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const total = m.wins + m.losses;
    const winRate = total > 0 ? Math.round((m.wins / total) * 100) : 0;
    html +=
      '<div class="ranking-item slide-in" style="animation-delay:' + (i * 0.05) + 's">' +
        '<div class="rank-num ' + rankClass + '">#' + (i + 1) + '</div>' +
        '<img class="rank-thumb" src="' + esc(m.imageUrl) + '" alt="meme">' +
        '<div class="rank-details">' +
          '<div class="rank-title">' + esc(m.name) + '</div>' +
          '<div class="rank-stats">' + m.wins + 'W - ' + m.losses + 'L &middot; ' + winRate + '% win rate &middot; ' + total + ' battles</div>' +
        '</div>' +
        '<div class="rank-elo-val">' + m.elo + '</div>' +
      '</div>';
  });
  container.innerHTML = html;
}

function updateStats() {
  document.getElementById('stat-memes').textContent = memes.length;
  document.getElementById('stat-votes').textContent = totalVotes;
  document.getElementById('stat-users').textContent = totalUsers;
}

// Init
Promise.all([loadMemes(), loadStats()]).then(() => showView('battle'));
</script>
</body>
</html>
